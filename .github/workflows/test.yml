name: test

on:
  push:
    branches: ["**"]
    paths:
      - "qlnes/**"
      - "tests/**"
      - "vendor/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "ruff.toml"
      - "mypy.ini"
      - "qlnes.toml.example"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "qlnes/**"
      - "tests/**"
      - "vendor/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "ruff.toml"
      - "mypy.ini"
      - ".github/workflows/test.yml"
  workflow_dispatch:

# Cancel in-flight runs when a new push hits the same branch.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Build vendored ql6502 binary
        run: |
          mkdir -p bin
          gcc -O2 -o bin/ql6502 vendor/QL6502-src/*.c

      - name: Ruff lint
        run: ruff check qlnes tests

      - name: Ruff format check
        run: ruff format --check qlnes tests

      - name: Mypy
        run: mypy qlnes

      - name: Pytest (unit + integration + invariants)
        run: pytest tests/ -v --tb=short
