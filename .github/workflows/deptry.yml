name: deps audit

on:
  schedule:
    - cron: "0 7 * * 1"  # tous les lundis 07:00 UTC = 09:00 Paris (CEST) / 08:00 (CET)
  workflow_dispatch:      # déclenchement manuel possible
  push:
    paths:
      - "qlnes/**"
      - "requirements.txt"
      - ".github/workflows/deptry.yml"
  pull_request:
    paths:
      - "qlnes/**"
      - "requirements.txt"

jobs:
  deptry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install deptry

      - name: Run deptry
        run: deptry qlnes --requirements-files requirements.txt
