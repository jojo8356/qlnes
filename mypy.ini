[mypy]
python_version = 3.11
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True

# Strict on new MVP modules — A.1 phase 7.1 cross-cutting primitives.
[mypy-qlnes.det]
strict = True

[mypy-qlnes.io.*]
strict = True

[mypy-qlnes.config.*]
strict = True

# Third-party libs without stubs.
[mypy-py65.*]
ignore_missing_imports = True
[mypy-cynes.*]
ignore_missing_imports = True
[mypy-PIL.*]
ignore_missing_imports = True
[mypy-typer.*]
ignore_missing_imports = True
[mypy-lameenc.*]
ignore_missing_imports = True
