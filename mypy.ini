[mypy]
python_version = 3.13
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True

# Strict on new MVP modules — A.1 phase 7.1 cross-cutting primitives.
[mypy-qlnes.det]
strict = True

[mypy-qlnes.io.*]
strict = True

[mypy-qlnes.config.*]
strict = True

# Legacy runtime/export modules are not yet part of the strict typing
# contract. Keep mypy focused on the currently hardened MVP modules.
[mypy-qlnes.audio.*]
ignore_errors = True

[mypy-qlnes.cli]
ignore_errors = True

[mypy-qlnes.sprites]
ignore_errors = True

[mypy-qlnes.smb_graphics]
ignore_errors = True

# Third-party libs without stubs.
[mypy-py65.*]
ignore_missing_imports = True
[mypy-cynes.*]
ignore_missing_imports = True
[mypy-PIL.*]
ignore_missing_imports = True
[mypy-typer.*]
ignore_missing_imports = True
[mypy-lameenc.*]
ignore_missing_imports = True
[mypy-ulog.*]
ignore_missing_imports = True
